services:
  app:
    image: my-app:1.0
    container_name: profile-app
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://admin:password@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb
    networks:
      - profile-net

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - profile-net

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb
    networks:
      - profile-net

networks:
  profile-net:
    driver: bridge
