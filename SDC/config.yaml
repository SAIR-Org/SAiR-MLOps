# Configuration file for Sesame Disease Classification
# Based on paper: "Sesame Plant Disease Classification Using Deep Convolution Neural Networks"

# Data configuration
data_dir: "./data"  # Root directory with train/val/test subdirectories
batch_size: 32  # Paper doesn't specify, using standard value
num_workers: 4

# Model configuration
num_classes: 3  # bacterial_blight, phyllody, healthy
dropout: 0.5  # As specified in paper

# Training configuration
epochs: 40  # As specified in paper
lr: 0.001  # Initial learning rate
optimizer: "sgd"  # Paper uses SGD
momentum: 0.9
weight_decay: 0.0001  # L2 regularization

# Learning rate scheduler
scheduler: "cosine"  # Smooth decay over epochs
# Alternative schedulers:
# scheduler: "step"
# step_size: 10
# gamma: 0.1

# Loss configuration
use_class_weights: true  # Handle imbalanced datasets

# Checkpoint configuration
checkpoint_dir: "./checkpoints"
log_dir: "./logs"
resume: null  # Path to checkpoint to resume from

# Device configuration
device: "cuda"  # Use "cpu" if no GPU available

# Class names (in order of class indices)
class_names:
  - "bacterial_blight"
  - "phyllody"
  - "healthy"

# Data augmentation settings (already implemented in augmentation.py)
# These are for reference - actual values are in the code
augmentation:
  rotation: [-45, 45]  # degrees
  flipping: true
  scale: [1.2, 1.5]
  translation: [-50, 50]  # pixels
  shearing: [-30, 30]  # degrees

# Image preprocessing settings
preprocessing:
  target_size: [299, 299]
  median_filter_kernel: 5
  contrast_stretching: true
  normalize_mean: [0.485, 0.456, 0.406]  # ImageNet mean
  normalize_std: [0.229, 0.224, 0.225]  # ImageNet std
